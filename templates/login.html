<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <title>Login - {{.PanelTitle}}</title>
    <link rel="stylesheet" href="{{.AssetPrefix}}/css/main.css">
    <script defer src="{{.AssetPrefix}}/js/alpine.min.js"></script>
    <script src="{{.AssetPrefix}}/js/app.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" data-panel-prefix="/{{.RandomSuffix}}">
    <div class="min-h-screen flex items-center justify-center" x-data="loginForm()">
        <div class="card max-w-md w-full">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4">
                    <img src="{{.AssetPrefix}}/logo.png" alt="WP Panel" class="w-16 h-16 rounded-xl">
                </div>
                <h2 class="text-2xl font-bold text-white">WP Panel</h2>
                <p class="text-gray-400 mt-2">Please enter the admin password to sign in</p>
            </div>

            <form method="POST" @submit.prevent="login" x-show="!loading">
                <div class="mb-4">
                    <label class="label">Username</label>
                    <input type="text" x-model="username" name="username" class="input-field" placeholder="admin" autocomplete="username">
                </div>
                <div class="mb-6">
                    <label class="label">Password</label>
                    <input type="password" x-model="password" name="password" class="input-field" placeholder="Enter password" autocomplete="current-password">
                </div>

                <div x-cloak x-show="error" class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm"
                     x-text="error"></div>

                <button type="submit" class="btn-primary w-full" :disabled="!username || !password">
                    Sign In
                </button>
            </form>

            <div x-cloak x-show="loading && !success" class="text-center py-4">
                <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
                <p class="text-gray-400 mt-2">Authenticating...</p>
            </div>

            <div x-show="success" class="text-center py-8">
                <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <p class="text-green-400 font-medium mb-6">Authentication successful</p>
                <div class="p-5 rounded-lg mx-auto max-w-sm" style="background-color: #0f172a; border: 1px solid #334155;">
                    <p class="text-gray-300 text-sm leading-relaxed italic" x-text="quote"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
    const quotes = [
        "A journey of a thousand miles begins with a single step.\n— Laozi",
        "To do a good job, one must first sharpen one's tools.\n— The Analects",
        "Without accumulating small steps, one cannot reach a thousand miles.\n— Xunzi",
        "Learning without thought is labor lost; thought without learning is perilous.\n— Confucius",
        "The difficult things in the world must be done from the easy; the great things from the small.\n— Laozi",
        "Excellence comes from diligence; neglect comes from play.\n— Han Yu",
        "To know what you know and know what you do not know — that is true knowledge.\n— Confucius",
        "The road ahead is long and winding; I will search high and low.\n— Qu Yuan",
        "Study broadly, inquire carefully, think deeply, discern clearly, and practice earnestly.\n— The Doctrine of the Mean",
        "Knowledge from books is ultimately shallow; to truly know, one must practice.\n— Lu You",
        "With persistence, even metal and stone can be carved.\n— Xunzi",
        "Among any three people walking, there is always one worthy to be my teacher.\n— Confucius",
        "Haste makes waste; focusing on small gains prevents great achievements.\n— The Analects",
        "The noble person is calm and at ease; the petty person is always anxious.\n— Confucius",
        "Heaven moves with vigor; the noble person strives unceasingly to strengthen themselves.\n— The Book of Changes",
        "The great way is simple; action is what matters.",
        "Programs are meant to be read by humans and only incidentally for machines to execute.\n— Harold Abelson",
        "Simplicity is a prerequisite for reliability.\n— Edsger Dijkstra",
        "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.\n— Martin Fowler",
        "First make it work, then make it right, then make it fast.\n— Kent Beck",
    ];

    function loginForm() {
        return {
            username: '',
            password: '',
            loading: false,
            success: false,
            quote: '',
            error: '',
            async login() {
                if (!this.username || !this.password) {
                    this.error = 'Please enter a username and password';
                    return;
                }
                this.loading = true;
                this.error = '';
                try {
                    const resp = await api('/auth/login', {
                        method: 'POST',
                        body: { username: this.username, password: this.password },
                        silent: true
                    });
                    if (resp.success) {
                        this.success = true;
                        this.quote = quotes[Math.floor(Math.random() * quotes.length)];
                        setTimeout(() => {
                            window.location.href = '/' + document.body.dataset.panelPrefix.replace('/', '') + '/';
                        }, 1800);
                    } else {
                        this.error = resp.message || 'Login failed';
                        this.loading = false;
                    }
                } catch (e) {
                    this.error = e.message || 'Unable to connect to panel service. Please refresh and try again.';
                    this.loading = false;
                }
            }
        }
    }
    </script>
</body>
</html>
